name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.8.0)'
        required: true
        default: 'v0.8.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          # macOS builds disabled - Actions runner cost too high for current stage
          # - os: macos-latest
          #   platform: darwin
          #   arch: x64
          # - os: macos-latest
          #   platform: darwin
          #   arch: arm64

    runs-on: ${{ matrix.os }}

    env:
      CI_BUILD: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            libglib2.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri

      - name: Upload Windows artifacts
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v4
        with:
          name: pericode-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: pericode-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -name "*" | head -50

      - name: Prepare release files
        run: |
          mkdir -p release-files

          # Find and copy all distributable files
          find artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" \
          \) -exec cp {} release-files/ \;

          echo "=== Release files ==="
          ls -la release-files/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from PR
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent merged PR to main.
          # gh output is safe — piped through node, never interpolated in shell.
          PR_JSON=$(gh pr list --base main --state merged --limit 1 --json body,title)
          PR_TITLE=$(echo "$PR_JSON" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0]?.title || ''")
          PR_BODY=$(echo "$PR_JSON" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0]?.body || ''")

          # Try to extract notes between markers
          NOTES=$(echo "$PR_BODY" | sed -n '/<!-- RELEASE_NOTES_START -->/,/<!-- RELEASE_NOTES_END -->/{ /<!-- RELEASE_NOTES/d; p; }' | sed '/^$/d')

          # Fallback: use full PR body, then title
          if [ -z "$NOTES" ] || echo "$NOTES" | grep -qE '^\s*$'; then
            if [ -n "$PR_BODY" ]; then
              NOTES="$PR_BODY"
            else
              NOTES="$PR_TITLE"
            fi
          fi

          # Write to file for the next step (avoids shell interpolation)
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: PeriCode ${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.md
          files: release-files/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
